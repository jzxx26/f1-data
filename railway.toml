[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildEnvironment = "V3"

[deploy]
runtime = "V2"
numReplicas = 1
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
sleepApplication = false
useLegacyStacker = false
ipv6EgressEnabled = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10